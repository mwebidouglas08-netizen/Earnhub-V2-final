<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EarnHub – Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#F5C518;--gd:#D4A017;--green:#00C853;--dark:#08111F;--card:#121E30;--border:rgba(245,197,24,.14);--text:#E8EAF0;--muted:#6B7280;--red:#EF5350;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background-image:radial-gradient(ellipse 65% 50% at 50% 0%,rgba(245,197,24,.07) 0%,transparent 68%);}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:420px;}
.logo{font-family:'Space Grotesk',sans-serif;font-size:1.75rem;font-weight:800;color:var(--gold);text-align:center;margin-bottom:.25rem;}
.logo span{color:var(--green);}
.sub{text-align:center;color:var(--muted);font-size:.88rem;margin-bottom:2rem;}
.fg{margin-bottom:1.1rem;}
label{font-size:.83rem;font-weight:500;margin-bottom:.35rem;display:block;}
input,select{width:100%;padding:.72rem 1rem;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s;font-family:'Inter',sans-serif;}
input:focus,select:focus{border-color:var(--gold);}
input::placeholder{color:var(--muted);}
select option{background:var(--card);}
.btn{width:100%;padding:.85rem;background:var(--gold);color:#08111F;font-weight:700;border:none;border-radius:10px;font-size:.97rem;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .2s;margin-top:.4rem;}
.btn:hover{background:var(--gd);transform:translateY(-1px);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.lrow{text-align:center;margin-top:1.1rem;font-size:.88rem;color:var(--muted);}
.lrow a{color:var(--gold);font-weight:500;}
.alert{padding:.7rem 1rem;border-radius:8px;font-size:.88rem;margin-bottom:.9rem;display:none;}
.alert.error{background:rgba(239,83,80,.1);border:1px solid rgba(239,83,80,.3);color:var(--red);}
.alert.success{background:rgba(0,200,83,.1);border:1px solid rgba(0,200,83,.3);color:var(--green);}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Earn<span>Hub</span></div>
  <div class="sub">Sign in to your account</div>
  <div id="alert" class="alert"></div>
  <div class="fg"><label>Username or Email</label><input type="text" id="username" placeholder="Enter your username or email" autocomplete="username"/></div>
  <div class="fg"><label>Password</label><input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/></div>
  <button class="btn" id="btn" onclick="doLogin()">Sign In</button>
  <div class="lrow">Don't have an account? <a href="/register">Create Account</a></div>
  <div class="lrow" style="margin-top:.5rem;"><a href="/">← Back to Home</a></div>
</div>
<script>
async function doLogin(){
  const btn=document.getElementById('btn');
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  if(!u||!p){show('Fill in all fields.','error');return;}
  btn.disabled=true;btn.textContent='Signing in…';
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(d.success){show('Success! Redirecting…','success');setTimeout(()=>{window.location.href=d.activated?'/dashboard':'/activate';},700);}
    else{show(d.message,'error');btn.disabled=false;btn.textContent='Sign In';}
  }catch{show('Network error. Try again.','error');btn.disabled=false;btn.textContent='Sign In';}
}
function show(m,t){const e=document.getElementById('alert');e.textContent=m;e.className='alert '+t;e.style.display='block';}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
