<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EarnHub – Admin Access</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#F5C518;--gd:#D4A017;--green:#00C853;--dark:#08111F;--card:#121E30;--border:rgba(245,197,24,.14);--text:#E8EAF0;--muted:#6B7280;--red:#EF5350;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background-image:radial-gradient(ellipse 65% 50% at 50% 0%,rgba(239,83,80,.04) 0%,transparent 68%);}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:400px;}
.badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(239,83,80,.08);border:1px solid rgba(239,83,80,.2);border-radius:50px;padding:.3rem .75rem;font-size:.74rem;color:#EF5350;margin-bottom:1.4rem;}
.logo{font-family:'Space Grotesk',sans-serif;font-size:1.75rem;font-weight:800;color:var(--gold);text-align:center;margin-bottom:.25rem;}
.logo span{color:var(--green);}
.sub{text-align:center;color:var(--muted);font-size:.88rem;margin-bottom:2rem;}
.fg{margin-bottom:1.15rem;}
label{font-size:.83rem;font-weight:500;margin-bottom:.35rem;display:block;}
input{width:100%;padding:.72rem 1rem;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s;font-family:'Inter',sans-serif;}
input:focus{border-color:var(--gold);}
input::placeholder{color:var(--muted);}
.btn{width:100%;padding:.85rem;background:var(--gold);color:#08111F;font-weight:700;border:none;border-radius:10px;font-size:.97rem;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .2s;}
.btn:hover{background:var(--gd);}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.back{text-align:center;margin-top:1rem;font-size:.85rem;color:var(--muted);}
.back a{color:var(--gold);}
.alert{padding:.7rem 1rem;border-radius:8px;font-size:.88rem;margin-bottom:.9rem;display:none;}
.alert.error{background:rgba(239,83,80,.1);border:1px solid rgba(239,83,80,.3);color:var(--red);}
.alert.success{background:rgba(0,200,83,.1);border:1px solid rgba(0,200,83,.3);color:var(--green);}
</style>
</head>
<body>
<div class="card">
  <div style="text-align:center;"><div class="badge">🔐 Admin Portal</div></div>
  <div class="logo">Earn<span>Hub</span></div>
  <div class="sub">Admin Dashboard Access</div>
  <div id="alert" class="alert"></div>
  <div class="fg"><label>Admin Username</label><input type="text" id="u" placeholder="Enter admin username" autocomplete="username"/></div>
  <div class="fg"><label>Password</label><input type="password" id="p" placeholder="Enter admin password" autocomplete="current-password"/></div>
  <button class="btn" id="btn" onclick="doLogin()">Access Dashboard</button>
  <div class="back"><a href="/">← Back to EarnHub</a></div>
</div>
<script>
async function doLogin(){
  const btn=document.getElementById('btn');
  const u=document.getElementById('u').value.trim();
  const p=document.getElementById('p').value;
  if(!u||!p){show('Enter credentials.','error');return;}
  btn.disabled=true;btn.textContent='Authenticating…';
  try{
    const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(d.success){show('Access granted!','success');setTimeout(()=>window.location.href='/admin/dashboard',500);}
    else{show(d.message,'error');btn.disabled=false;btn.textContent='Access Dashboard';}
  }catch{show('Network error.','error');btn.disabled=false;btn.textContent='Access Dashboard';}
}
function show(m,t){const e=document.getElementById('alert');e.textContent=m;e.className='alert '+t;e.style.display='block';}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
